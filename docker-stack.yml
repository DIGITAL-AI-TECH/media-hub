version: '3.8'

services:
  api:
    image: registry.digital-ai.tech/digital-ai/media-hub-api:${VERSION:-latest}
    networks:
      - oraculusnet_v2
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PREFIX: media-hub
      CDN_BASE_URL: ${CDN_BASE_URL}
      API_PORT: "3000"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      LOG_LEVEL: info
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.media-hub.rule=Host(`media.digital-ai.tech`)"
        - "traefik.http.routers.media-hub.entrypoints=websecure"
        - "traefik.http.routers.media-hub.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.media-hub.service=media-hub"
        - "traefik.http.services.media-hub.loadbalancer.server.port=3000"
        - "traefik.docker.network=oraculusnet_v2"

  worker:
    image: registry.digital-ai.tech/digital-ai/media-hub-worker:${VERSION:-latest}
    networks:
      - oraculusnet_v2
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PREFIX: media-hub
      CDN_BASE_URL: ${CDN_BASE_URL}
      WORKER_CONCURRENCY: "2"
      LOG_LEVEL: info
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 15s
        order: stop-first

  redis:
    image: redis:7-alpine
    networks:
      - oraculusnet_v2
    volumes:
      - media_hub_redis:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  oraculusnet_v2:
    external: true

volumes:
  media_hub_redis:
