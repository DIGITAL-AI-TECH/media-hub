version: '3.8'

services:
  api:
    image: registry.digital-ai.tech/digital-ai/media-hub-api:${VERSION:-latest}
    networks:
      - oraculusnet_v2
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://media-hub-redis:6379
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PREFIX: media-hub
      CDN_BASE_URL: ${CDN_BASE_URL}
      API_PORT: "3000"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ADMIN_KEY: ${ADMIN_KEY}
      MH_TOKEN_SECRET: ${MH_TOKEN_SECRET}
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/v1/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.media-hub.rule=Host(`media.digital-ai.tech`)"
        - "traefik.http.routers.media-hub.entrypoints=websecure"
        - "traefik.http.routers.media-hub.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.media-hub.service=media-hub"
        - "traefik.http.services.media-hub.loadbalancer.server.port=3000"
        - "traefik.docker.network=oraculusnet_v2"
        - "traefik.http.routers.media-hub-http.rule=Host(`media.digital-ai.tech`)"
        - "traefik.http.routers.media-hub-http.entrypoints=web"
        - "traefik.http.routers.media-hub-http.middlewares=media-hub-https-redirect"
        - "traefik.http.middlewares.media-hub-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.media-hub-https-redirect.redirectscheme.permanent=true"

  worker:
    image: registry.digital-ai.tech/digital-ai/media-hub-worker:${VERSION:-latest}
    networks:
      - oraculusnet_v2
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://media-hub-redis:6379
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PREFIX: media-hub
      CDN_BASE_URL: ${CDN_BASE_URL}
      WORKER_CONCURRENCY: "2"
      LOG_LEVEL: info
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 15s
        order: stop-first
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # TODO WARN-06: adicionar requirepass ao Redis + atualizar REDIS_URL
  # Refs: https://redis.io/docs/management/security/
  redis:
    image: redis:7-alpine
    networks:
      oraculusnet_v2:
        aliases:
          - media-hub-redis  # alias único para evitar conflito de DNS com outros Redis na rede
    volumes:
      - media_hub_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  oraculusnet_v2:
    external: true

volumes:
  media_hub_redis:
