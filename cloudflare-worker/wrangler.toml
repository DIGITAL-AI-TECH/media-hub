name = "media-hub-cdn"
main = "worker.js"
compatibility_date = "2024-09-23"
account_id = "fe0885a03431922a8c75fe7ce4f8a722"

# Variáveis públicas (não sensíveis)
[vars]
S3_BUCKET_DOMAIN = "s3.us-east-1.amazonaws.com/cdn.digital-ai.tech"

# Secrets — configurar via CLI:
#   wrangler secret put MH_TOKEN_SECRET   (mesmo valor que na API)
#   wrangler secret put CF_S3_SECRET      (valor do Referer na bucket policy S3)
#
# Após configurar: wrangler deploy

[[routes]]
pattern = "cdn.digital-ai.tech/media-hub/*"
zone_name = "digital-ai.tech"
